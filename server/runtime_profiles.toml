[profiles.hybrid_gemini_live_tts]
category = "benchmark_streaming"

[profiles.hybrid_gemini_live_tts.wake]
provider = "openwakeword"
model_path = "models/mave.onnx"
threshold = 0.70
vad_threshold = 0.0
candidate_log_threshold = 0.3
required_hits = 1
min_wake_rms = 0.01
min_wake_peak = 12
pre_buffer_s = 0.35
single_command = true

[profiles.hybrid_gemini_live_tts.emergency_stop]
enabled = false

[profiles.hybrid_gemini_live_tts.stt]
provider = "openai_realtime"
model = "gpt-realtime-whisper"

[profiles.hybrid_gemini_live_tts.tts]
provider = "gemini_live"
model = "gemini-3.1-flash-live-preview"
voice = "Enceladus"

[profiles.hybrid_gemini_live_tts.voice_modulation]
enabled = false
preset_name = "ai_core"
gain_db = 0.0
wet_mix = 1.0
low_cut_hz = 0.0
high_cut_hz = 8200.0
drive = 0.0
bit_depth = 16
pitch_shift_semitones = 0.0
body_shift = 0.12
ring_mod_hz = 0.0
tremolo_hz = 0.0
tremolo_depth = 0.0
chorus_rate_hz = 0.35
chorus_depth_ms = 18.0
chorus_mix = 0.26
echo_delay_ms = 110.0
echo_feedback = 0.18
echo_mix = 0.16
noise_mix = 0.0
breath_mix = 0.0
limiter = true

[profiles.hybrid_gemini_live_tts.agent]
provider = "gemini_api"
model = "gemini-3.1-flash-lite-preview"
reasoning_effort = "high"
temperature = 0.7
api_key_env = "GOOGLE_API_KEY"

[profiles.hybrid_gemini_live_tts.mcp.robot]
url = "http://127.0.0.1:8765/mcp"

[profiles.hybrid_gemini_live_tts.robot_execution]
simulation_only = false
# For real robot execution, set simulation_only=false and provide verified_execution_url.
verified_execution_url = "http://127.0.0.1:8770"

[profiles.hybrid_gemini_live_tts.embodiment]
enabled = false
rosbridge_host = "127.0.0.1"
rosbridge_port = 9090
animation_topic = "/HOLO1_AnimSignal"
animation_topic_type = "std_msgs/String"
start_blink_on_connect = true
stop_blink_on_disconnect = true
wave_duration_s = 0.8
move_duration_s = 1.0

[profiles.hybrid_gemini_live_tts.embodiment.touch_trigger]
enabled = false
topic = "/HOLO1_TouchSignal"
topic_type = "std_msgs/String"
link_name = "configured_link_name"
motion = "move"
cooldown_s = 1.0

[profiles.hybrid_gemini_live_tts.metrics]
enabled = true
path = "logs/voice_metrics.jsonl"
include_text = true

[profiles.hybrid_gemini_live_tts.process_trace]
enabled = true
path = "logs/process_trace.jsonl"
include_text = true
include_tool_payloads = true
