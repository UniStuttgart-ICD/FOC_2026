name: mave-workshop

services:
  vizor-demo:
    image: samulienko/noetic-vizor-rviz:latest
    tty: true
    environment:
      - ROS_HOSTNAME=vizor-demo
      - ROS_MASTER_URI=http://ros-core:11311
      - DISPLAY=:1
    volumes:
      - ./server/logs/moveit_planning:/root/catkin_ws/logs/moveit_planning
    ports:
      - "6080:6080"
      - "5901:5901"
      - "9090:9090"
      - "10000:10000"
      - "10001:10001"
      - "10002:10002"
      - "10003:10003"
    depends_on:
      - ros-core

  ros-core:
    image: ghcr.io/samulko/noetic-vizor-local:latest
    ports:
      - "11311:11311"
    command:
      - roscore

  vizor-mcp:
    image: ghcr.io/samulko/01-docker-multi-actor-mcp:latest
    depends_on:
      - vizor-demo
    restart: unless-stopped
    command:
      - python
      - -m
      - vizor_mcp
      - --rosbridge-host
      - vizor-demo
      - --rosbridge-port
      - "9090"
      - --transport
      - streamable-http
      - --http-host
      - 0.0.0.0
      - --http-port
      - "8001"
      - --enable-holo1-tracking-on-startup
      - --attention-window-s
      - "8.0"
    ports:
      - "8001:8001"

  moveit-mcp:
    image: ghcr.io/samulko/01-docker-multi-actor-mcp:latest
    depends_on:
      - vizor-demo
    restart: unless-stopped
    command:
      - python
      - -m
      - moveit_mcp
      - --rosbridge-host
      - vizor-demo
      - --rosbridge-port
      - "9090"
      - --transport
      - streamable-http
      - --http-host
      - 0.0.0.0
      - --http-port
      - "8765"
    ports:
      - "8765:8765"
